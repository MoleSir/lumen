[workspace]
members = [
    "lumen-core", 
    "lumen-dataset",
    "lumen-nn",
    "lumen-io"
]

[workspace.package]
version = "0.1.0"
edition = "2024"
repository = "https://github.com/MoleSir/lumen.git"
description = "Lumen: A tiny ML framework"
keywords = ["machine-learning", "auto-grad"]
license = "MIT"

[workspace.dependencies]
lumen-core = { path = "./lumen-core", package = "lumen-core", version = "0.1.0" }
lumen-nn = { path = "./lumen-nn", package = "lumen-nn", version = "0.1.0" }
lumen-dataset = { path = "./lumen-dataset", package = "lumen-dataset", version = "0.1.0" }
lumen-io = { path = "./lumen-io", package = "lumen-io", version = "0.1.0" }

anyhow = "1.0.98"
approx = "0.5.1"
rand = "0.9.2"
rand_distr = "0.5.1"
thiserror = "2.0.12"